# goreleaser — builds the static devbrain binary for darwin/linux on
# amd64/arm64 and publishes the Homebrew formula to TheWeiHu/homebrew-devbrain.
# Snapshot builds: `goreleaser release --snapshot --clean` (no tag needed).
version: 2

project_name: devbrain

builds:
  - main: ./cmd/devbrain
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/TheWeiHu/devbrain/internal/version.Version={{.Version}}
      - -X github.com/TheWeiHu/devbrain/internal/version.Commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  # No hand-maintained CHANGELOG — the git log is the source of truth. Release
  # notes are generated from the commits between tags and land in the GitHub Release.
  use: git
  sort: asc
  filters:
    exclude:
      - '^nightshift: merge '
      - '^Merge '
      - '^docs:'
      - '^test:'

release:
  draft: true

# Auto-publish the Homebrew formula so `brew upgrade devbrain` tracks each release
# without a hand-edited formula bump. goreleaser regenerates Formula/devbrain.rb from
# the release archives (url + sha256 per platform) and opens a PR against the tap repo.
# See RELEASING.md for the end-to-end runbook.
#
# Why a PR and not a direct push (`pull_request.enabled`): the release is a draft
# (`draft: true` above), so its download URLs 404 until it's published. Pushing the
# formula straight to the tap's main would make `brew` 404 in that gap. Opening a PR
# instead means the formula lands only when you merge it — which you do AFTER publishing
# the draft — so there's no broken-tap window. It also keeps the human review gate.
#
# `skip_upload: auto` skips the tap entirely for prereleases/snapshots (tags like
# v1.3.0-rc1), so only real releases ever touch the tap.
#
# Token: GITHUB_TOKEN must have access to the SEPARATE homebrew-devbrain repo (open PRs
# there), not just this repo. A personal PAT covers both; a repo-scoped CI token would not.
#
# `brews` (formula) is deprecated by goreleaser in favour of `homebrew_casks`, but casks
# are macOS-only — Linuxbrew can't install them (Homebrew: "Casks are not supported on
# Linux"). devbrain ships a Linux binary too, so the formula generator is the correct
# tool. It's deprecated-but-functional with no removal date. `goreleaser check` warns
# about it; that warning isn't gated anywhere (CI runs only go vet + go test).
brews:
  - repository:
      owner: TheWeiHu
      name: homebrew-devbrain
      branch: main
      pull_request:
        enabled: true
    skip_upload: auto
    directory: Formula
    homepage: "https://github.com/TheWeiHu/devbrain"
    # Keep < 80 chars — Homebrew's brew audit/style rejects longer descriptions.
    description: "Turn your prompts into a durable, queryable brain any agent can resume from"
    license: "MIT"
    install: |
      bin.install "devbrain"
    caveats: |
      Wire this machine (hooks, skills, dashboard):
        devbrain install
    test: |
      assert_match version.to_s, shell_output("#{bin}/devbrain version")
