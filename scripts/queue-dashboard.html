<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>devbrain · queue</title>
<style>
  /* Same tokens as nightshift-dashboard.html so the two read as one app. */
  :root{--bg:#0b0f17;--panel:#141a26;--line:#222c3d;--ink:#dbe3f0;--dim:#7d8aa3;
        --accent:#6ea8ff;--open:#6ea8ff;--taken:#ffcf5c;--review:#b98bff;--held:#ff6b6b;--done:#3fd07f}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 ui-monospace,Menlo,monospace}
  header{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--line)}
  h1{font-size:15px;margin:0;font-weight:600}
  select,button,input,textarea{font:inherit;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:5px 9px}
  button{cursor:pointer} button:hover{border-color:var(--accent)}
  .primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  a{color:var(--accent)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px}
  .chip{padding:3px 10px;border-radius:99px;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;font-size:13px}
  .chip.on{color:var(--ink);border-color:var(--accent)}
  main{padding:4px 18px 40px}
  .needs{border:1px solid var(--held);background:#1a1316;border-radius:8px;padding:10px 14px;margin:8px 0 16px}
  .needs h2{margin:0 0 6px;font-size:12px;color:var(--held);text-transform:uppercase}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:var(--dim);font-weight:500;font-size:12px;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  .pri{text-align:right;width:38px;font-variant-numeric:tabular-nums}
  .id{font-size:12px;color:var(--dim)} .meta{font-size:12px;color:var(--dim);margin-top:2px}
  .st{font-size:11px;font-weight:600;text-transform:uppercase}
  .st.open{color:var(--open)}.st.taken{color:var(--taken)}.st.review{color:var(--review)}.st.held{color:var(--held)}.st.done{color:var(--done)}
  .acts{display:flex;gap:4px;flex-wrap:wrap}.acts button{padding:2px 7px;font-size:12px}
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center}
  .mask.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;width:min(520px,92vw)}
  .modal label{display:block;color:var(--dim);font-size:12px;margin:9px 0 3px}
  .modal input,.modal textarea{width:100%}.modal textarea{min-height:110px}
  .row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:8px 14px;opacity:0;transition:.2s}
  #toast.on{opacity:1} #toast.err{border-color:var(--held);color:var(--held)}
  .empty{color:var(--dim);padding:20px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>devbrain · <span style="color:var(--accent)">queue</span></h1>
  <select id="project" title="project"></select>
  <button id="reload" title="reload">↻</button>
  <a id="ns" target="_blank" style="display:none">🌙 nightshift ↗</a>
  <span style="flex:1"></span>
  <button class="primary" id="new">+ New task</button>
</header>
<div class="chips" id="chips"></div>
<main>
  <section class="needs" id="needs" style="display:none"></section>
  <table><thead><tr><th class="pri">pri</th><th>status</th><th>task</th><th>actions</th></tr></thead>
    <tbody id="rows"></tbody></table>
  <div class="empty" id="empty" style="display:none">No tasks in this view.</div>
</main>
<div class="mask" id="mask"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<script>
const CATS=["open","taken","review","held","done","parked"];
const parked=t=>t.status==="held"&&/^\s*parked\b/i.test(t.reason||"");
const cat=t=>parked(t)?"parked":t.status;
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const safe=u=>/^(https?:\/\/|\/)/i.test((u||"").trim())?u:"";
let state={project:new URLSearchParams(location.search).get("project"),tasks:[],filter:new Set(["open","taken","review","held"])};

const api=async p=>(await fetch(p)).json();
async function act(body){const j=await(await fetch("/action",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})).json();toast(j.msg||(j.ok?"ok":"failed"),!j.ok);return j;}
function toast(m,err){const t=$("#toast");t.textContent=m;t.className="on"+(err?" err":"");clearTimeout(t._t);t._t=setTimeout(()=>t.className="",2400);}

async function loadProjects(){
  const ps=await api("/api/projects");
  $("#project").innerHTML=ps.map(p=>`<option value="${esc(p.key)}">${esc(p.key)} (${p.open+p.taken+p.review+p.held+p.done})</option>`).join("");
  if(!ps.length){$("#rows").innerHTML="";$("#empty").style.display="block";$("#empty").textContent="No projects under ~/devbrain-data/projects.";return;}
  state.project=ps.some(p=>p.key===state.project)?state.project:ps[0].key;
  $("#project").value=state.project;
  const u=new URL(location);u.searchParams.set("project",state.project);history.replaceState(null,"",u);
  await loadTasks();
}
async function loadTasks(){
  state.tasks=(await api("/api/tasks?project="+encodeURIComponent(state.project))).tasks||[];
  render();
  try{const n=await api("/api/nightshift?project="+encodeURIComponent(state.project));$("#ns").style.display=n.active?"":"none";if(n.active)$("#ns").href=n.url;}catch{}
}
function render(){
  const counts={};CATS.forEach(c=>counts[c]=0);state.tasks.forEach(t=>counts[cat(t)]++);
  $("#chips").innerHTML=CATS.map(c=>`<span class="chip ${state.filter.has(c)?"on":""}" onclick="toggle('${c}')">${c} ${counts[c]}</span>`).join("");
  const held=state.tasks.filter(t=>t.status==="held"&&!parked(t));
  const nb=$("#needs");
  if(held.length){nb.style.display="block";nb.innerHTML=`<h2>⚠ needs you — ${held.length} held</h2>`+held.map(t=>
    `<div><span class="id">${esc(t.id)}</span> ${esc(t.title)}${t.reason?` <span class="st held">↳ ${esc(t.reason)}</span>`:""}
     <span class="acts" style="display:inline-flex"><button onclick="doAct('release','${t.id}')">Release</button><button onclick="doAct('approve','${t.id}')">Approve</button></span></div>`).join("");}
  else nb.style.display="none";
  const rows=state.tasks.filter(t=>state.filter.has(cat(t)));
  $("#empty").style.display=rows.length?"none":"block";
  $("#rows").innerHTML=rows.map(rowHtml).join("");
}
function rowHtml(t){
  const pr=safe(t.pr)?` · <a href="${esc(t.pr)}" target="_blank" rel="noopener">PR ↗</a>`:"";
  const who=t.claimed_by?` · ${esc(t.claimed_by)}`:"";
  const a=[`<button onclick="openEdit('${t.id}')">Edit</button>`,`<button onclick="openPrio('${t.id}',${t.priority_n})">Prio</button>`,`<button onclick="openCtx('${t.id}')">Context</button>`];
  if(t.status==="open")a.push(`<button onclick="doAct('claim','${t.id}')">Claim</button>`);
  if(t.status!=="open"&&t.status!=="done")a.push(`<button onclick="doAct('release','${t.id}')">→ Open</button>`);
  if(t.status!=="held")a.push(`<button onclick="openHold('${t.id}')">Hold</button>`);
  if(t.status!=="done")a.push(`<button onclick="doAct('done','${t.id}')">Done</button>`);
  return `<tr><td class="pri">${esc(t.priority)}</td><td><span class="st ${t.status}">${t.status}</span></td>
    <td>${esc(t.title)}<div class="id">${esc(t.id)}</div><div class="meta">${who}${pr}</div></td>
    <td><div class="acts">${a.join("")}</div></td></tr>`;
}
window.toggle=c=>{state.filter.has(c)?state.filter.delete(c):state.filter.add(c);render();};
window.doAct=async(cmd,id)=>{if((await act({project:state.project,cmd,id})).ok)loadProjects();};

function modal(h){$("#modal").innerHTML=h;$("#mask").className="mask on";}
window.closeModal=()=>$("#mask").className="mask";
$("#mask").onclick=e=>{if(e.target.id==="mask")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
window.openEdit=id=>{const t=state.tasks.find(x=>x.id===id);modal(`<h3>Edit ${esc(id)}</h3>
  <label>Title</label><input id="m1" value="${esc(t.title)}"><label>Body</label><textarea id="m2">${esc(t.body)}</textarea>
  <div class="row"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="save('edit','${id}',{title:m1.value,body:m2.value})">Save</button></div>`);};
window.openPrio=(id,c)=>modal(`<h3>Priority ${esc(id)}</h3><label>0–100</label><input id="m1" type="number" min="0" max="100" value="${c}">
  <div class="row"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="save('prio','${id}',{prio:m1.value})">Save</button></div>`);
window.openCtx=id=>modal(`<h3>Add context ${esc(id)}</h3><textarea id="m1" placeholder="what the next worker should know…"></textarea>
  <div class="row"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="save('context','${id}',{body:m1.value})">Save</button></div>`);
window.openHold=id=>modal(`<h3>Hold ${esc(id)}</h3><label>Reason</label><input id="m1" placeholder="why it's parked…">
  <div class="row"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="save('hold','${id}',{reason:m1.value})">Hold</button></div>`);
window.save=async(cmd,id,extra)=>{const j=await act({project:state.project,cmd,id,...extra});closeModal();if(j.ok)loadProjects();};
$("#new").onclick=()=>modal(`<h3>New task</h3><label>Title</label><input id="m1"><label>Priority</label><input id="m2" type="number" min="0" max="100" value="0"><label>Body</label><textarea id="m3"></textarea>
  <div class="row"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="create()">Create</button></div>`);
window.create=async()=>{if(!m1.value.trim())return toast("title required",true);const j=await act({project:state.project,cmd:"add",title:m1.value,prio:m2.value,body:m3.value});closeModal();if(j.ok)loadProjects();};
$("#project").onchange=e=>{state.project=e.target.value;loadTasks();};
$("#reload").onclick=loadProjects;
setInterval(()=>{if(!document.hidden&&!$("#mask").classList.contains("on")&&state.project)loadTasks().catch(()=>{});},5000);
loadProjects();
</script>
</body>
</html>
