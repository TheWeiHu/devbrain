<!doctype html>
<html><head><meta charset="utf-8"><title>DevBrain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#0b0d12;--panel:#11141b;--panel2:#0e1117;--line:#1f2430;--line2:#171b24;
  --text:#e6e8ee;--muted:#8b93a7;--accent:#6e8bff;--on-accent:#0b0d12;
  --open:#3b82f6;--taken:#f59e0b;--review:#a855f7;--held:#ef4444;--done:#10b981;
  --warn:#f59e0b;--danger:#ef4444;--ok:#10b981;--radius:10px;
  --mono:ui-monospace,SFMono-Regular,"JetBrains Mono","IBM Plex Mono",Menlo,monospace;
  --shadow:0 1px 2px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
body{margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
  font:13px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
header{position:sticky;top:0;z-index:5;display:flex;gap:9px;align-items:center;flex-wrap:wrap;
  padding:10px 16px;background:rgba(13,16,22,.85);backdrop-filter:saturate(160%) blur(8px);border-bottom:1px solid var(--line)}
.sp{flex:1}
.count{color:var(--muted);font-size:12px}
select,input,textarea,button{font:inherit;color:var(--text);background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:6px 10px}
select{cursor:pointer} button{cursor:pointer;transition:border-color .12s,background .12s}
button:hover,select:hover{border-color:#2c3344}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
button.ghost{background:var(--panel)}
.search{position:relative;display:flex;align-items:center}
.search input{padding-right:38px;width:248px}
.search kbd{position:absolute;right:7px;font:11px/1 var(--mono);color:var(--muted);
  border:1px solid var(--line);border-radius:5px;padding:3px 5px;background:var(--panel2)}

.board{display:grid;gap:14px;padding:16px;align-items:start;
  grid-template-columns:minmax(220px,1.2fr) minmax(210px,1fr) minmax(200px,.85fr) minmax(238px,1.3fr) minmax(210px,1fr)}
.col{min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:12px}
.col-head{display:flex;align-items:center;gap:8px;padding:11px 13px 8px}
.col-head .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--muted)}
.col-head h2{font-size:12px;margin:0;font-weight:600;letter-spacing:.01em;text-transform:capitalize}
.col-head .count{margin-left:auto;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
.col[data-status=open] .dot{background:var(--open)}
.col[data-status=taken] .dot{background:var(--taken)}
.col[data-status=review] .dot{background:var(--review)}
.col[data-status=held] .dot{background:var(--held)}
.col[data-status=done] .dot{background:var(--done)}
.bar{height:3px;margin:0 13px 4px;border-radius:3px;background:var(--line);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:3px}
.drop{padding:9px 10px 11px;display:flex;flex-direction:column;gap:8px;min-height:26px;
  max-height:calc(100vh - 196px);overflow-y:auto}
.col.over,.col.target{outline:2px dashed var(--accent);outline-offset:-3px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:9px 11px;
  cursor:grab;overflow-wrap:anywhere;transition:transform .12s,border-color .12s,box-shadow .12s}
.card:hover{transform:translateY(-1px);border-color:#2c3344;box-shadow:0 6px 20px -8px rgba(0,0,0,.6)}
.card:active{cursor:grabbing}
.card[aria-grabbed=true]{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card[data-pri=p0]{box-shadow:inset 3px 0 0 var(--held)}
.card[data-pri=p1]{box-shadow:inset 3px 0 0 var(--warn)}
.chips{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:600;line-height:1.6;padding:0 7px;border-radius:999px;
  border:1px solid var(--line);color:var(--muted);background:var(--panel2);letter-spacing:.02em}
.chip.p0{color:#ffb4b4;background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.4)}
.chip.p1{color:#f4c285;background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.34)}
.chip.proj{font-family:var(--mono);font-weight:500;text-transform:none}
.chip.ok{color:var(--ok);background:rgba(16,185,129,.13);border-color:rgba(16,185,129,.32)}
.card .t{font-size:13px;line-height:1.4;margin:0;font-weight:500;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.card .reason{margin-top:6px;color:var(--warn);font-size:11px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .foot{display:flex;align-items:center;gap:8px;margin-top:8px;color:var(--muted);font-size:11px}
.avatar{width:18px;height:18px;border-radius:50%;background:var(--accent);color:var(--on-accent);
  font:700 9px/1 var(--mono);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card .id{font-family:var(--mono);color:var(--muted)}
.card .foot a{color:var(--accent);text-decoration:none}
.card .age{margin-left:auto;font-variant-numeric:tabular-nums}
.card .age.warn{color:var(--warn)} .card .age.danger{color:var(--danger)}
.card .pri{font-family:var(--mono);color:var(--muted)}
.card .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:4px}

details.group{border:1px solid var(--line2);border-radius:9px;background:rgba(239,68,68,.05)}
details.group>summary,details.fold>summary{cursor:pointer;list-style:none}
details.group>summary::-webkit-details-marker,details.fold>summary::-webkit-details-marker{display:none}
details.group>summary{display:flex;align-items:center;gap:7px;padding:8px 10px;font-size:11px;color:var(--warn)}
.chev{transition:transform .15s;color:var(--muted)} details[open]>summary .chev{transform:rotate(90deg)}
details.group>summary .count{margin-left:auto;color:var(--muted)}
details.group .items,details.fold .items{display:flex;flex-direction:column;gap:8px;padding:0 8px 8px}
details.fold>summary{padding:7px;text-align:center;font-size:11px;color:var(--muted)}
details.fold .items{padding-top:8px}

.empty{color:var(--muted);font-size:11px;text-align:center;padding:16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:20}
.modal.show{display:flex}
.sheet{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(600px,94vw);
  max-height:92vh;overflow:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.sheet h3{margin:0 0 14px;font-size:15px;font-weight:600;font-family:var(--mono)}
.fld{display:flex;gap:12px;margin-bottom:12px}
.fld>label{flex:1;display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--muted);font-weight:500}
.fld>label.chk{flex-direction:row;align-items:center;gap:8px;font-size:13px;color:var(--text);font-weight:400;cursor:pointer}
input[type=checkbox]{width:auto;padding:0;accent-color:var(--accent)}
textarea{min-height:110px;resize:vertical;width:100%}
.actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.danger{color:var(--danger);border-color:#3a2026}
small.k{color:var(--muted)}
/* --- prompt self-portrait view (#profile) — scoped so it can't fight the board --- */
#profile{padding:16px;max-width:1400px;margin:0 auto}
/* profile filter controls live in the header (like the board's filters) */
#pf-controls{display:inline-flex;align-items:center;gap:9px;flex-wrap:wrap}
#pf-controls .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
#pf-controls .seg button{background:var(--panel);color:var(--muted);border:0;border-right:1px solid var(--line);padding:6px 11px;cursor:pointer;font:inherit;font-size:12px;transition:background .12s,color .12s}
#pf-controls .seg button:last-child{border-right:0}
#pf-controls .seg button:hover{color:var(--text)}
#pf-controls .seg button.on{background:var(--accent);color:var(--on-accent);font-weight:600}
#pf-controls .pf-dates{display:inline-flex;align-items:center;gap:6px}
#pf-controls .pf-dates input{padding:5px 8px;color-scheme:dark}
#pf-controls .pf-dates .arr{color:var(--muted)}
#profile .pf-note{text-align:center;color:var(--muted);font-size:11px;font-family:var(--mono);margin:-2px 0 14px}
#profile .statbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
#profile .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 16px;text-align:center;transition:border-color .12s}
#profile .stat.act{cursor:pointer} #profile .stat.act:hover{border-color:var(--accent)}
#profile .stat b{font:600 19px/1.2 var(--mono);display:block;font-variant-numeric:tabular-nums}
#profile .stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
#profile .player{display:grid;grid-template-columns:1fr 400px;gap:14px;align-items:start}
#profile .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
#profile .pcol{min-width:0;background:var(--panel2);border:1px solid var(--line);border-radius:12px}
#profile .pcol.full{grid-column:1/3}
#profile .pch{display:flex;align-items:center;gap:8px;padding:11px 13px 4px}
#profile .pch .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--accent)}
#profile .pch h2{font-size:12px;margin:0;font-weight:600}
#profile .pch .claim{margin-left:auto;color:var(--muted);font-size:11px;text-align:right}
#profile .pch .claim b{color:var(--text);font-family:var(--mono)}
#profile .pbody{padding:6px 13px 14px}
#profile svg{display:block;width:100%;overflow:visible}
#profile .hit{cursor:pointer;transition:opacity .12s} #profile .hit:hover{opacity:.62}
#profile text{font-family:var(--mono)}
#profile .panel{position:sticky;top:62px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;max-height:calc(100vh - 92px);display:flex;flex-direction:column}
#profile .panel .pch{border-bottom:1px solid var(--line2);padding:12px 14px 10px}
#profile .panel .pch h2{font-size:13px}
#profile .panel .pct{margin-left:auto;font:600 12px var(--mono);color:var(--accent)}
#profile .psearch{padding:10px 11px 0}
#profile .psearch input{width:100%}
#profile .plist{overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:8px}
#profile .hint{color:var(--muted);font-size:12px;padding:6px 4px;line-height:1.5}
#profile .pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:9px 11px;transition:transform .12s,border-color .12s,box-shadow .12s}
#profile .pcard:hover{transform:translateY(-1px);border-color:#2c3344;box-shadow:0 6px 20px -8px rgba(0,0,0,.6)}
#profile .pchips{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
#profile .pchip{font:600 10px/1.7 var(--mono);padding:0 7px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--panel2)}
#profile .pchip.proj{color:var(--accent);background:rgba(110,139,255,.12);border-color:rgba(110,139,255,.32)}
#profile .pchip.k-command{color:var(--accent);background:rgba(110,139,255,.12);border-color:rgba(110,139,255,.32)}
#profile .pchip.k-nightshift{color:var(--taken);background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.34)}
#profile .pchip.k-system,#profile .pchip.k-title-gen{color:var(--muted)}
#profile .pcard .t{font-size:13px;line-height:1.45;color:var(--text);white-space:pre-wrap;word-break:break-word}
/* compact gbrain "brain value" readout, sits under the word cloud */
#profile .gb{border-top:1px solid var(--line2);margin-top:8px;padding:11px 4px 2px}
#profile .gb-head{font-size:11px;color:var(--muted);margin-bottom:9px}
#profile .gb-head b{color:var(--ok);font-family:var(--mono)}
#profile .gb-sub{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint,#777);margin-bottom:5px}
#profile .gb-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px}
#profile .gb-page{font-family:var(--mono);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:0 0 150px}
#profile .gb-bar{flex:1;height:4px;background:var(--line);border-radius:3px;overflow:hidden}
#profile .gb-bar i{display:block;height:100%;background:var(--ok);border-radius:3px}
#profile .gb-n{color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 22px;text-align:right;font-family:var(--mono)}
#profile .gb-topics{margin-top:9px;font-size:10.5px;color:var(--muted);line-height:1.55}
#profile .gb-topics b{color:var(--text);font-weight:500}
#profile .cloud{display:flex;flex-wrap:wrap;gap:6px 8px;padding:14px;align-items:baseline}
#profile .word{cursor:pointer;line-height:1.1;font-family:var(--mono);transition:color .12s}
#profile .word:hover{color:var(--text)!important;text-decoration:underline}
#profile .reset{margin:0 11px 11px;font-size:11px;color:var(--muted);cursor:pointer;border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:6px 10px;align-self:flex-start;transition:border-color .12s}
#profile .reset:hover{border-color:var(--accent);color:var(--text)}
#profile .sel circle{stroke:var(--text);stroke-width:2} #profile .sel rect{stroke:var(--text);stroke-width:2}
#profile .foot{color:var(--muted);font-size:11px;text-align:center;padding:18px 0 6px;font-family:var(--mono)}
@media(max-width:1000px){#profile .player{grid-template-columns:1fr}#profile .charts{grid-template-columns:1fr}#profile .pcol.full{grid-column:auto}#profile .panel{position:static;max-height:none}}

/* view switcher (segmented pill) */
.viewseg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:2px;gap:2px}
.viewseg button{border:0;background:transparent;color:var(--muted);border-radius:999px;padding:4px 12px;font-weight:600;font-size:12px}
.viewseg button:hover{color:var(--text);background:transparent;border:0}
.viewseg button.active{background:var(--accent);color:var(--on-accent)}

/* nightshift monitor — regressed toward the original: token chart, agent terminals, logs, merges */
#monitor{font-family:var(--mono)}
.ns-run{margin-bottom:22px}
.ns-head{display:flex;align-items:center;gap:10px;margin:0 2px 12px;font-family:system-ui}
.ns-head h2{font-size:14px;margin:0;font-weight:600}
.ns-pill{padding:2px 9px;border-radius:999px;font-size:11px;border:1px solid var(--line);color:var(--muted)}
.ns-pill.live{color:var(--ok);border-color:rgba(16,185,129,.5)}
.ns-pill.dead{color:var(--danger);border-color:rgba(239,68,68,.4)}
.ns-upd{margin-left:auto;color:var(--muted);font-size:11px}
.ns-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;justify-content:center}
.ns-stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 16px;min-width:96px;text-align:center}
.ns-stat .n{font-size:19px;font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums}
.ns-stat .l{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ns-panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px}
.ns-panel>h3,.ns-term>h3{margin:0;padding:9px 13px;border-bottom:1px solid var(--line);font-family:system-ui}
.ns-panel>h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.ns-chart{width:100%;display:block;height:180px;padding:8px}
.ns-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:12px;margin-bottom:12px}
.ns-term{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.ns-term>h3{font-size:12px;display:flex;align-items:center;gap:8px}
.ns-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:0 0 auto}
.ns-dot.working{background:var(--ok);box-shadow:0 0 8px var(--ok);animation:nspulse 1.4s infinite}
@keyframes nspulse{50%{opacity:.4}}
.ns-task{color:var(--accent);font-family:var(--mono)}
.ns-rate{color:var(--accent);font-size:11px;margin-left:auto}
.ns-state{color:var(--muted);font-size:11px}
.ns-msgs{max-height:440px;overflow:auto;background:var(--bg)}
.ns-msg{padding:7px 13px;border-bottom:1px solid var(--line2);white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.5}
.ns-msg:last-child{border-bottom:none}
.ns-ts{color:var(--muted);font-size:10px;margin-right:8px;user-select:none}
.ns-mtext{color:#cdd6e4}
.ns-sep{display:flex;align-items:center;gap:8px;padding:3px 13px;color:var(--muted);font-size:9px;letter-spacing:.6px;text-transform:uppercase;user-select:none}
.ns-sep::before,.ns-sep::after{content:"";flex:1;height:1px;background:var(--line2)}
.ns-empty{padding:14px 13px;color:var(--muted);font-style:italic}
.ns-log{margin:0;padding:11px 13px;max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-word;
  color:#c4ccda;font-size:12px;background:var(--bg);font-family:var(--mono)}
.ns-merge{color:var(--ok)}
.ns-cols{display:flex;gap:12px;flex-wrap:wrap}
.ns-cols .ns-panel{flex:1 1 360px;margin-bottom:0}
</style></head>
<body>
<header>
  <div class="viewseg" id="viewseg" role="tablist" aria-label="View">
    <button data-view="board" class="active">📋 Board</button>
    <button data-view="profile">📊 Profile</button>
    <button data-view="monitor" id="viewMonitorBtn" style="display:none">🌙 Nightshift</button>
  </div>
  <span class="sp"></span>
  <div class="search"><input id="search" placeholder="Search tasks, PRs, authors…" aria-label="Search"><kbd>⌘K</kbd></div>
  <select id="filterProject" aria-label="Project filter"><option value="">all projects</option></select>
  <select id="filterAssignee" aria-label="Assignee filter"><option value="">anyone</option></select>
  <button class="primary" id="newBtn">＋ New</button>
  <span id="pf-controls" style="display:none">
    <div class="seg" id="pf-kind" title="typed = what you wrote at the keyboard (prose + your slash-commands); bot = autonomous nightshift sessions + harness injections">
      <button data-k="typed" class="on">⌨ Typed</button>
      <button data-k="bot">🤖 Bot</button>
      <button data-k="all">∑ All</button>
    </div>
    <div class="seg" id="pf-range">
      <button data-d="7">7d</button>
      <button data-d="30" class="on">30d</button>
      <button data-d="90">90d</button>
      <button data-d="0">All</button>
    </div>
    <span class="pf-dates">
      <input type="date" id="pf-from" aria-label="from date">
      <span class="arr">→</span>
      <input type="date" id="pf-to" aria-label="to date">
    </span>
  </span>
</header>
<div class="board" id="board"></div>
<div id="monitor" style="display:none;padding:14px 16px"></div>
<div id="profile" style="display:none">
  <div class="statbar" id="pf-stats"></div>
  <div class="pf-note" id="pf-kindnote"></div>
  <div class="player">
    <div class="charts">
      <div class="pcol"><div class="pch"><span class="dot"></span><h2>Where The Attention Went</h2><span class="claim" id="pf-c-proj"></span></div><div class="pbody"><svg id="pf-s-proj"></svg></div></div>
      <div class="pcol"><div class="pch"><span class="dot"></span><h2>Working Rhythm</h2><span class="claim" id="pf-c-heat"></span></div><div class="pbody"><svg id="pf-s-heat"></svg></div></div>
      <div class="pcol"><div class="pch"><span class="dot"></span><h2>How You Talk To The Machine</h2><span class="claim" id="pf-c-tone"></span></div><div class="pbody"><svg id="pf-s-tone"></svg></div></div>
      <div class="pcol"><div class="pch"><span class="dot"></span><h2>Terse By Default</h2><span class="claim" id="pf-c-len"></span></div><div class="pbody"><svg id="pf-s-len"></svg></div></div>
      <div class="pcol full"><div class="pch"><span class="dot"></span><h2>How Terse, Week By Week</h2><span class="claim" id="pf-c-wk"></span></div><div class="pbody"><svg id="pf-s-wk"></svg></div></div>
    </div>
    <aside class="panel">
      <div class="pch"><span class="dot" id="pf-dot"></span><h2 id="pf-title">Words You Use</h2><span class="pct" id="pf-pct"></span></div>
      <div class="psearch"><input id="pf-search" placeholder="Search prompts…" aria-label="Search prompts"></div>
      <div class="plist" id="pf-list"></div>
      <button class="reset" id="pf-reset">↺ summary</button>
    </aside>
  </div>
</div>

<div class="modal" id="modal"><div class="sheet">
  <h3 id="mTitle">Edit task</h3>
  <div class="fld">
    <label style="flex:2">Title<input id="fTitle"></label>
    <label style="flex:0 0 80px">Priority<input id="fPriority" type="number" min="0" max="100"></label>
  </div>
  <div class="fld">
    <label>Status<select id="fStatus"></select></label>
    <label>Project<select id="fProject"></select></label>
  </div>

<script>
const LABEL = {open:"Open",taken:"Taken",review:"Review",held:"Held",done:"Done"};
const WIP = {taken:5, review:3};                 // per-column work-in-progress limits (bar turns red over)
let DATA = {tasks:[],projects:[],statuses:[]}, EDIT = null, grab = null;
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const safe = u => /^https?:\/\//i.test((u||"").trim()) ? u : "";
const shortProj = p => (p||"").split("__").pop();
const priClass = p => p>=80?"p0":p>=60?"p1":p>=40?"p2":"p3";
function ageDays(t){ if(!t.created) return null; const d=Math.floor((Date.now()-Date.parse(t.created))/864e5); return isNaN(d)?null:d; }
function initials(s){ const w=(s||"").replace(/@.*/,"").match(/[a-z0-9]+/ig)||[]; return ((w[0]?.[0]||"")+(w[1]?.[0]||w[0]?.[1]||"")).toUpperCase()||"·"; }

async function load(){
  DATA = await (await fetch("/api/todos")).json();
  const fp=$("#filterProject"), cur=fp.value;
  fp.innerHTML = '<option value="">all projects</option>'+DATA.projects.map(p=>`<option value="${esc(p)}">${esc(shortProj(p))}</option>`).join("");
  fp.value = cur;
  const who=[...new Set(DATA.tasks.map(t=>t.claimed_by).filter(Boolean))].sort();
  const fa=$("#filterAssignee"), curA=fa.value;
  fa.innerHTML = '<option value="">anyone</option>'+who.map(w=>`<option>${esc(w)}</option>`).join("");
  fa.value = curA;
  $("#fProject").innerHTML = DATA.projects.map(p=>`<option value="${esc(p)}">${esc(shortProj(p))}</option>`).join("");
  $("#fStatus").innerHTML = DATA.statuses.map(s=>`<option value="${s}">${LABEL[s]}</option>`).join("");
  render(); checkNS();
}
function render(){
  cancelGrab();
  const proj=$("#filterProject").value, asg=$("#filterAssignee").value, q=$("#search").value.toLowerCase();
  const tasks = DATA.tasks.filter(t=>(!proj||t.project===proj) && (!asg||t.claimed_by===asg) &&
    (!q || (t.title+" "+t.body+" "+t.id+" "+t.claimed_by).toLowerCase().includes(q)));
  const board=$("#board"); board.innerHTML="";
  for(const st of DATA.statuses){
    let list = tasks.filter(t=>t.status===st);
    list.sort(st==="done" ? (a,b)=>(b.done_at||"").localeCompare(a.done_at||"") : (a,b)=>b.priority-a.priority);
    const total=list.length, lim=WIP[st];
    const c=document.createElement("div"); c.className="col"; c.dataset.status=st;
    c.setAttribute("role","group"); c.setAttribute("aria-label",`${LABEL[st]} (${total})`);
    c.innerHTML = `<div class="col-head"><span class="dot" aria-hidden="true"></span>
        <h2>${LABEL[st]}</h2><span class="count">${lim?`${total} / ${lim} WIP`:total}</span></div>
      ${lim?`<div class="bar"><span style="width:${Math.min(100,total/lim*100)}%;background:${total>lim?"var(--danger)":`var(--${st})`}"></span></div>`:""}
      <div class="drop" role="list"></div>`;
    const drop=c.querySelector(".drop");
    if(st==="held") renderHeld(drop,list);
    else if(st==="done") renderDone(drop,list);
    else if(!total) drop.innerHTML='<div class="empty">—</div>';
    else for(const t of list) drop.appendChild(card(t));
    drop.addEventListener("dragover",e=>{e.preventDefault();c.classList.add("over");});
    drop.addEventListener("dragleave",()=>c.classList.remove("over"));
    drop.addEventListener("drop",e=>{e.preventDefault();c.classList.remove("over");
      const id=e.dataTransfer.getData("id"), pj=e.dataTransfer.getData("project");
      const t=DATA.tasks.find(x=>x.id===id&&x.project===pj);
      if(t && t.status!==st){ t.status=st; save(t); }});
    board.appendChild(c);
  }
}
// Held: collapse repeated parked reasons into one collapsible group each; singletons stay plain cards.
function renderHeld(drop,list){
  if(!list.length){ drop.innerHTML='<div class="empty">—</div>'; return; }
  const groups=new Map();
  for(const t of list){ const k=t.reason||""; (groups.get(k)||groups.set(k,[]).get(k)).push(t); }
  for(const [k,items] of groups){
    if(k && items.length>1){
      const d=document.createElement("details"); d.className="group"; d.open=true;
      d.innerHTML=`<summary><span class="chev">▸</span> ⚠ ${esc(k)} <span class="count">${items.length}</span></summary>`;
      const box=document.createElement("div"); box.className="items";
      for(const t of items) box.appendChild(card(t,true));     // reason shown once in the summary
      d.appendChild(box); drop.appendChild(d);
    } else for(const t of items) drop.appendChild(card(t));
  }
}
// Done: show the last 24h as cards, fold the rest behind "Show N older".
function renderDone(drop,list){
  if(!list.length){ drop.innerHTML='<div class="empty">—</div>'; return; }
  const cut=Date.now()-864e5;
  const fresh=list.filter(t=>t.done_at && Date.parse(t.done_at)>=cut);
  const older=list.filter(t=>!(t.done_at && Date.parse(t.done_at)>=cut));
  for(const t of fresh) drop.appendChild(card(t));
  if(older.length){
    const d=document.createElement("details"); d.className="fold";
    d.innerHTML=`<summary>Show ${older.length} older</summary>`;
    const box=document.createElement("div"); box.className="items";
    for(const t of older.slice(0,80)) box.appendChild(card(t));
    if(older.length>80) box.insertAdjacentHTML("beforeend",`<div class="empty">+${older.length-80} more — search to find them</div>`);
    d.appendChild(box); drop.appendChild(d);
  }
}
function card(t, hideReason){
  const el=document.createElement("div"); el.className="card"; el.draggable=true;
  el.tabIndex=0; el.setAttribute("role","button"); el.setAttribute("aria-grabbed","false");
  el.dataset.id=t.id; el.dataset.project=t.project;
  const pc=priClass(t.priority);
  if(t.status!=="done" && (pc==="p0"||pc==="p1")) el.dataset.pri=pc;   // accent only on urgent active work
  const age=ageDays(t), ageCls=age==null?"":(age>14?"danger":age>7?"warn":"");
  const num=(t.id.match(/^\d+/)||[""])[0];
  el.innerHTML = `<div class="chips">
      <span class="chip ${pc}">${pc.toUpperCase()}</span>
      ${$("#filterProject").value?"":`<span class="chip proj">${esc(shortProj(t.project))}</span>`}
      ${t.approved?`<span class="chip ok">✓ approved</span>`:""}
    </div>
    <div class="t">${esc(t.title)||"<em>untitled</em>"}</div>
    ${t.reason&&!hideReason?`<div class="reason">⚠ ${esc(t.reason)}</div>`:""}
    <div class="foot">
      ${t.claimed_by?`<span class="avatar" title="${esc(t.claimed_by)}">${esc(initials(t.claimed_by))}</span>`:""}
      ${num?`<span class="id">#${num}</span>`:""}
      ${safe(t.pr)?`<a href="${esc(t.pr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PR↗</a>`:""}
      ${age!=null?`<span class="age ${ageCls}" title="created ${esc(t.created)}">${age}d</span>`:""}
    </div>`;
  el.addEventListener("click",()=>openEdit(t));
  el.addEventListener("dragstart",e=>{e.dataTransfer.setData("id",t.id);e.dataTransfer.setData("project",t.project);});
  el.addEventListener("keydown",e=>cardKey(e,t,el));
  return el;
}
// Keyboard drag: Enter opens; Space picks up / drops; ←/→ choose target column; Esc cancels.
function cardKey(e,t,el){
  if(e.key==="Enter"){ e.preventDefault(); openEdit(t); }
  else if(e.key===" "){ e.preventDefault(); grab ? commitGrab() : startGrab(t,el); }
  else if(grab && (e.key==="ArrowRight"||e.key==="ArrowLeft")){ e.preventDefault();
    setTarget(Math.max(0,Math.min(DATA.statuses.length-1, grab.target+(e.key==="ArrowRight"?1:-1)))); }
  else if(e.key==="Escape" && grab){ e.preventDefault(); cancelGrab(); }
}
function startGrab(t,el){ grab={t,el,target:DATA.statuses.indexOf(t.status)}; el.setAttribute("aria-grabbed","true"); setTarget(grab.target); }
function setTarget(n){ if(!grab)return; grab.target=n;
  document.querySelectorAll(".col").forEach((c,i)=>c.classList.toggle("target", i===n && DATA.statuses[i]!==grab.t.status)); }
function cancelGrab(){ if(!grab)return; grab.el.setAttribute("aria-grabbed","false");
  document.querySelectorAll(".col.target").forEach(c=>c.classList.remove("target")); grab=null; }
function commitGrab(){ if(!grab)return; const st=DATA.statuses[grab.target], t=grab.t; cancelGrab();
  if(t.status!==st){ t.status=st; save(t); } }

function openEdit(t){
  EDIT=t; $("#mTitle").textContent="#"+t.id;
  $("#fTitle").value=t.title; $("#fPriority").value=t.priority;
  $("#fStatus").value=t.status; $("#fProject").value=t.project; $("#fProject").disabled=true;
  $("#fBody").value=t.body; $("#fReason").value=t.reason||""; $("#fApproved").checked=!!t.approved;
  $("#fMeta").textContent=`created ${t.created||"?"}${t.claimed_by?" · "+t.claimed_by:""}${t.done_at?" · done "+t.done_at:""}`;
  $("#deleteBtn").style.display=""; $("#modal").classList.add("show"); $("#fTitle").focus();
}
function openCreate(){
  EDIT={create:true}; $("#mTitle").textContent="New task";
  $("#fTitle").value=""; $("#fPriority").value=40; $("#fStatus").value="open";
  $("#fProject").disabled=false; $("#fProject").value=$("#filterProject").value||DATA.projects[0];
  $("#fBody").value=""; $("#fReason").value=""; $("#fApproved").checked=false; $("#fMeta").textContent="";
  $("#deleteBtn").style.display="none"; $("#modal").classList.add("show"); $("#fTitle").focus();
}
function close(){ $("#modal").classList.remove("show"); EDIT=null; }
async function save(t){
  await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({project:t.project,id:t.id,title:t.title,body:t.body,priority:t.priority,status:t.status,reason:t.reason||""})});
  await load();
}
async function saveModal(){
  if(EDIT&&EDIT.create){
    if(!$("#fTitle").value.trim()) return $("#fTitle").focus();
    await fetch("/api/create",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project:$("#fProject").value,title:$("#fTitle").value,priority:+$("#fPriority").value,body:$("#fBody").value})});
  } else {
    await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project:EDIT.project,id:EDIT.id,title:$("#fTitle").value,body:$("#fBody").value,
        priority:+$("#fPriority").value,status:$("#fStatus").value,reason:$("#fReason").value,approved:$("#fApproved").checked})});
  }
  close(); await load();
}
async function del(){
  if(!EDIT||EDIT.create) return;
  if(!confirm("Delete "+EDIT.id+"? This removes the .md file.")) return;
  await fetch("/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({project:EDIT.project,id:EDIT.id})});
  close(); await load();
}
// --- nightshift monitor: regressed toward the original dashboard — token chart, per-agent
//     "terminals" (live response feed), orchestrator log, and the merged-into-staging feed. ---
let NS={runs:[]}, VIEW="board";
const kfmt = n => n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+"k" : (n||0);
const _cs = getComputedStyle(document.documentElement), tok = n => _cs.getPropertyValue(n).trim();   // theme colors for canvas
async function checkNS(){
  try{ NS = await (await fetch("/api/nightshift")).json(); }
  catch{ return; }
  $("#viewMonitorBtn").style.display = (NS.runs.length || VIEW==="monitor") ? "" : "none";  // Nightshift tab only when a fleet exists
  if(VIEW==="monitor") renderMonitor();
}
function setView(v){
  VIEW=v;
  $("#board").style.display = v==="board" ? "grid" : "none";
  $("#monitor").style.display = v==="monitor" ? "block" : "none";
  $("#profile").style.display = v==="profile" ? "block" : "none";
  document.querySelectorAll("#viewseg button").forEach(b=>b.classList.toggle("active", b.dataset.view===v));
  // swap navbar controls: board's filters vs the profile's filters
  const prof = v==="profile";
  document.querySelector(".search").style.display = prof ? "none" : "";
  for(const id of ["filterProject","filterAssignee","newBtn"]) $("#"+id).style.display = prof ? "none" : "";
  $("#pf-controls").style.display = prof ? "inline-flex" : "none";
  if(v==="monitor") renderMonitor();
  if(v==="profile") openProfile();
}
function renderMonitor(){
  const m=$("#monitor");
  if(!NS.runs.length){ m.innerHTML='<div class="empty">no nightshift runs active</div>'; return; }
  m.innerHTML = NS.runs.map(fleet).join("");
  NS.runs.forEach((r,i)=>{ const c=document.getElementById("ns-chart-"+i); if(c) drawChart(c, r.history||[]); });
  m.querySelectorAll(".ns-msgs").forEach(el=>{ el.scrollTop=el.scrollHeight; });   // keep each feed at the latest
}
function fleet(r,i){
  const q=r.queue||{}, t=r.tokens_min||{}, p=r.parked||[];
  const stats=[["open",q.open],["merged (done)",q.done],["in review",q.review],["parked",p.length],
      ["↑ out/min",kfmt(t.out),1],["↓ in/min",kfmt(t.in)]]
    .map(([l,n,a])=>`<div class="ns-stat"><div class="n"${a?' style="color:var(--accent)"':''}>${n??0}</div><div class="l">${esc(l)}</div></div>`).join("");
  const terms=(r.workers||[]).map(w=>{
    let prev=null;
    const body=(w.responses&&w.responses.length)
      ? w.responses.map(msg=>{                       // one continuous feed, split into turns on session change
          const sep=(msg.sid&&msg.sid!==prev&&prev!==null)?'<div class="ns-sep">new turn</div>':"";
          prev=msg.sid;
          return `${sep}<div class="ns-msg"><span class="ns-ts">${esc(msg.t)}</span><span class="ns-mtext">${esc(msg.text)}</span></div>`;
        }).join("")
      : '<div class="ns-empty">no responses yet — agent starting up or running tools</div>';
    return `<div class="ns-term"><h3><span class="ns-dot ${esc(w.state)}"></span>worker ${w.i}
        <span class="ns-task">${esc(w.task||"—")}</span>
        <span class="ns-rate">↑${kfmt(w.tout)} tok/min</span>
        <span class="ns-state">${esc(w.state)}</span></h3>
      <div class="ns-msgs">${body}</div></div>`;
  }).join("") || '<div class="ns-empty">(no workers running — nightshift start)</div>';
  const merges=(r.nightshift||[]).map(l=>`<span class="ns-merge">${esc(l)}</span>`).join("\n") || "(nothing merged yet)";
  const log=(r.log||[]).map(esc).join("\n") || "(no log yet)";
  return `<div class="ns-run">
    <div class="ns-head"><h2>${esc(r.project)}</h2>
      <span class="ns-pill ${r.running?"live":"dead"}">${r.running?"running":"stopped"}</span>
      <span class="ns-upd">updated ${esc((r.updated||"").replace("T"," ").replace("Z"," UTC"))}</span></div>
    <div class="ns-stats">${stats}</div>
    <div class="ns-panel"><h3>token throughput — out tokens/min</h3><canvas id="ns-chart-${i}" class="ns-chart"></canvas></div>
    <div class="ns-grid">${terms}</div>
    <div class="ns-cols">
      <div class="ns-panel"><h3>merged → nightshift · the branch you review</h3><pre class="ns-log">${merges}</pre></div>
      <div class="ns-panel"><h3>orchestrator</h3><pre class="ns-log">${log}</pre></div>
    </div>
  </div>`;
}
function drawChart(c, hist){
  const dpr=window.devicePixelRatio||1, W=c.clientWidth||800, H=180;
  c.width=W*dpr; c.height=H*dpr;
  const x=c.getContext("2d"); x.setTransform(dpr,0,0,dpr,0,0); x.clearRect(0,0,W,H);
  const mono="11px "+tok("--mono"), accent=tok("--accent"), muted=tok("--muted"), line=tok("--line");
  if(hist.length<2){ x.fillStyle=muted; x.font=mono; x.fillText("collecting data… (one point per minute)",12,24); return; }
  const pad={l:52,r:12,t:12,b:22}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const maxv=Math.max(100,...hist.map(p=>p.out||0));
  const X=i=>pad.l+pw*(i/(hist.length-1)), Y=v=>pad.t+ph*(1-v/maxv);
  const plot=()=>hist.forEach((p,i)=>{ const a=X(i),b=Y(p.out||0); i?x.lineTo(a,b):x.moveTo(a,b); });
  x.strokeStyle=line; x.fillStyle=muted; x.font=mono; x.lineWidth=1;
  for(let g=0;g<=2;g++){ const v=maxv*g/2, yy=Y(v); x.beginPath(); x.moveTo(pad.l,yy); x.lineTo(W-pad.r,yy); x.stroke(); x.fillText(kfmt(Math.round(v)),6,yy+4); }
  x.beginPath(); plot(); x.lineTo(X(hist.length-1),Y(0)); x.lineTo(X(0),Y(0)); x.closePath();
  x.globalAlpha=.16; x.fillStyle=accent; x.fill(); x.globalAlpha=1;
  x.beginPath(); plot(); x.strokeStyle=accent; x.lineWidth=2; x.stroke();
  x.fillStyle=muted;
  const ticks=Math.min(8,hist.length), seen={};
  for(let j=0;j<ticks;j++){ const i=Math.round(j*(hist.length-1)/(ticks-1)); if(seen[i])continue; seen[i]=1;
    x.textAlign=i===0?"left":i===hist.length-1?"right":"center"; x.fillText(hist[i].t||"",X(i),H-6); }
  x.textAlign="start";
}
document.querySelectorAll("#viewseg button").forEach(b=>b.onclick=()=>setView(b.dataset.view));
if(location.hash==="#profile") addEventListener("load",()=>setView("profile"));
setInterval(checkNS, 5000);
$("#newBtn").onclick=openCreate;
$("#saveBtn").onclick=saveModal; $("#cancelBtn").onclick=close; $("#deleteBtn").onclick=del;
$("#filterProject").onchange=render; $("#filterAssignee").onchange=render; $("#search").oninput=render;
$("#modal").onclick=e=>{if(e.target.id==="modal")close();};
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); $("#search").focus(); $("#search").select(); }
  else if(e.key==="Escape"){ if(grab) cancelGrab(); else close(); }
});
load();
</script>

  if(!ALL.length){ $('pf-list').innerHTML='<div class="hint">no prompts logged yet.</div>'; return; }
  if(!ALL.length){ $('pf-list').innerHTML='<div class="hint">no prompts logged yet.</div>'; return; }
  // Logs are UTC; convert each turn to the VIEWER's local time so "when you work"
  // (heatmap, peak hour, weekend, weekday, week buckets, card times) reads off the wall clock.
  ALL.forEach(p=>{
    p._l=p.x.toLowerCase().trim();
    const d=new Date(p.dt+'Z');                 // p.dt is naive UTC; 'Z' pins the instant
    p.h=d.getHours();
    p.wd=DOW[(d.getDay()+6)%7];
    p.date=ymd(d);
    p.time=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    p.dt=p.date+'T'+p.time;                      // keep dt local-consistent for sorting/bucketing
  });
  const minD=ALL[0].date, maxD=ALL[ALL.length-1].date;
  const from=$('pf-from'), to=$('pf-to');
  from.min=to.min=minD; from.max=to.max=maxD; to.value=maxD;
  from.value=(t=>t<minD?minD:t)(addDays(maxD,-30));            // default window: last 30 days
  $('pf-reset').onclick=showSummary; $('pf-search').oninput=renderPanel;
  document.querySelectorAll('#pf-kind button').forEach(b=>b.onclick=()=>setKind(b.dataset.k));
  document.querySelectorAll('#pf-range button').forEach(b=>b.onclick=()=>setRange(+b.dataset.d,b));
  from.onchange=to.onchange=()=>{ markRange(null); applyFilters(); };
  applyFilters();
};
function setRange(days,btn){
  markRange(btn);
  const maxD=$('pf-to').max, minD=$('pf-from').min;
  $('pf-to').value=maxD;
  $('pf-from').value = days ? (t=>t<minD?minD:t)(addDays(maxD,-days)) : minD;
  applyFilters();
}
function markRange(btn){ document.querySelectorAll('#pf-range button').forEach(b=>b.classList.toggle('on',b===btn)); }
function setKind(k){
  KIND=k;
  document.querySelectorAll('#pf-kind button').forEach(b=>b.classList.toggle('on',b.dataset.k===k));
  applyFilters();
}
function applyFilters(){
  const from=$('pf-from').value, to=$('pf-to').value;
  const win=ALL.filter(p=>(!from||p.date>=from)&&(!to||p.date<=to));
  const typed=win.filter(p=>TYPED.has(p.kind)).length;
  P = KIND==='all'?win : KIND==='bot'?win.filter(p=>!TYPED.has(p.kind)) : win.filter(p=>TYPED.has(p.kind));
  N=P.length;
  $('pf-kindnote').textContent=`${typed.toLocaleString()} typed · ${(win.length-typed).toLocaleString()} bot · showing ${N.toLocaleString()}`;
  const svgs=['pf-s-proj','pf-s-heat','pf-s-tone','pf-s-len','pf-s-wk'];
  if(!N){ $('pf-stats').innerHTML=''; svgs.forEach(id=>$(id).innerHTML=''); $('pf-list').innerHTML='<div class="hint">no prompts in this window.</div>'; $('pf-pct').textContent=''; return; }
  buildWords(); buildStats(); chProj(); chHeat(); chTone(); chLen(); chWeek(); showSummary();
}
// Compact "what is the brain worth" readout, shown under the word cloud.
function gbrainSummary(){
  const from=$('pf-from').value, to=$('pf-to').value;
  const g=GB.filter(r=>(!from||r.date>=from)&&(!to||r.date<=to));
  const reads=g.filter(r=>r.read), withHits=reads.filter(r=>r.hits>0).length;
  const rate=reads.length?Math.round(100*withHits/reads.length):0;
  const wrap=document.createElement('div'); wrap.className='gb';
  const head=document.createElement('div'); head.className='gb-head';
  head.innerHTML=`🧠 gbrain — <b>${rate}%</b> hit rate · ${reads.length} reads`;
  wrap.appendChild(head);
  if(!reads.length){ const e=document.createElement('div'); e.className='hint'; e.style.padding='0'; e.textContent='no brain reads in this window.'; wrap.appendChild(e); return wrap; }
  const ct={}; g.forEach(r=>r.slugs.forEach(s=>ct[s]=(ct[s]||0)+1));
  const rows=Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(rows.length){
    const sub=document.createElement('div'); sub.className='gb-sub'; sub.textContent='Pages the brain leaned on most';
    wrap.appendChild(sub);
    const max=rows[0][1];
    rows.forEach(([slug,v])=>{
      const row=document.createElement('div'); row.className='gb-row'; row.title=slug;
      const name=document.createElement('span'); name.className='gb-page'; name.textContent=slug.split('/').pop();
      const bar=document.createElement('span'); bar.className='gb-bar';
      const i=document.createElement('i'); i.style.width=Math.round(100*v/max)+'%'; bar.appendChild(i);
      const n=document.createElement('span'); n.className='gb-n'; n.textContent=v;
      row.appendChild(name); row.appendChild(bar); row.appendChild(n); wrap.appendChild(row);
    });
  }
  // recently asked — cleaned: drop shell-var noise, keep short readable phrases
  const clean=[...new Set(g.filter(r=>r.q && !/[$`]/.test(r.q) && r.q.length<=46 && /[a-z]/i.test(r.q)).map(r=>r.q))];
  const recent=clean.slice(-3).reverse();
  if(recent.length){
    const t=document.createElement('div'); t.className='gb-topics';
    t.innerHTML='recently asked: '+recent.map(q=>`<b>${esc(q)}</b>`).join(' · ');
    wrap.appendChild(t);
  }
  return wrap;
}

// ---- source panel ----
function makeCard(p){
  const d=document.createElement('div'); d.className='pcard';
  const ch=document.createElement('div'); ch.className='pchips';
  const tag=document.createElement('span'); tag.className='pchip proj'; tag.textContent=sp(p.p);
  const tm=document.createElement('span'); tm.className='pchip'; tm.textContent=`${p.date.slice(5)} · ${p.time}`;
  ch.appendChild(tag); ch.appendChild(tm);
  if(p.kind&&p.kind!=='human'){const k=document.createElement('span');k.className='pchip k-'+p.kind;k.textContent=p.kind;ch.appendChild(k);}
  const tx=document.createElement('div'); tx.className='t'; tx.textContent=p.x;
  d.appendChild(ch); d.appendChild(tx); return d;
}
function renderPanel(){
  const q=($('pf-search').value||'').toLowerCase().trim();
  $('pf-title').textContent=q?`Search · "${$('pf-search').value.trim()}"`:CURRENT.title;
  $('pf-dot').style.background=CURRENT.color;
  const box=$('pf-list'); box.innerHTML='';
  if(CURRENT.mode==='summary' && !q){
    $('pf-pct').textContent=`${WORDS.length} words`;
    if(WORDS.length){
      const cloud=document.createElement('div'); cloud.className='cloud';
      const max=WORDS[0][1],min=WORDS[WORDS.length-1][1];
      WORDS.forEach(([w,c])=>{const t=(c-min)/(max-min||1),sz=12+Math.round(t*15);
        const s=document.createElement('span'); s.className='word'; s.textContent=w; s.style.fontSize=sz+'px';
        s.style.color=t>0.6?'var(--text)':t>0.28?'var(--accent)':'var(--muted)';
        s.title=`${c} prompts — click to read them`; s.onclick=()=>selectWord(w); cloud.appendChild(s);});
      box.appendChild(cloud);
      const h=document.createElement('div'); h.className='hint';
      h.textContent='Most-used words across your prompts. Click a word — or any chart element — to read the source prompts.';
      box.appendChild(h);
    } else {
      box.innerHTML='<div class="hint">No prose words in this view — switch kind or widen the date range.</div>';
    }
    box.appendChild(gbrainSummary());     // brain-value readout below the words
    return;
  }
  let list=CURRENT.list; if(q) list=list.filter(p=>p._l.includes(q));
  $('pf-pct').textContent=`${list.length} · ${(100*list.length/N).toFixed(0)}%`;
  if(!list.length){box.innerHTML='<div class="hint">no prompts match.</div>'; return;}
  list.slice().sort((a,b)=>a.dt<b.dt?1:-1).slice(0,400).forEach(p=>box.appendChild(makeCard(p)));
  if(list.length>400){const h=document.createElement('div'); h.className='hint'; h.textContent=`+ ${list.length-400} more not shown`; box.appendChild(h);}
}
function clearSel(){document.querySelectorAll('#profile .sel').forEach(e=>e.classList.remove('sel'));}
function select(node,title,list,color){clearSel(); if(node)node.classList.add('sel');
  CURRENT={mode:'list',title,list,color:color||'var(--accent)'}; renderPanel();}
function selectWord(w){clearSel();
  const rx=new RegExp('\\b'+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
  CURRENT={mode:'list',title:`Word · "${w}"`,list:P.filter(p=>rx.test(p.x)),color:'var(--accent)'}; renderPanel();}
function showSummary(){clearSel(); CURRENT={mode:'summary',title:'Words You Use',list:P,color:'var(--accent)'};
  $('pf-search').value=''; renderPanel();}

function buildWords(){
  const src = KIND==='bot' ? P : P.filter(p=>p.kind==='human');  // typed/all cloud = your prose only (not slash-commands)
  const wf={};
  src.forEach(p=>(p._l.match(/[a-z][a-z'+\-]{2,}/g)||[]).forEach(w=>{if(!STOP.has(w))wf[w]=(wf[w]||0)+1;}));
  WORDS=Object.entries(wf).sort((a,b)=>b[1]-a[1]).slice(0,46);
}
function buildStats(){
  const days=new Set(P.map(p=>p.date)).size, projsN=new Set(P.map(p=>p.p)).size;
  const medW=[...P.map(p=>p.w)].sort((a,b)=>a-b)[Math.floor(N/2)];
  const qN=P.filter(p=>p.x.includes('?')).length, wkndN=P.filter(p=>p.wd==='Sat'||p.wd==='Sun').length;
  const hc={}; P.forEach(p=>hc[p.h]=(hc[p.h]||0)+1);
  const peakH=+Object.entries(hc).sort((a,b)=>b[1]-a[1])[0][0];
  const stats=[
    ['Prompts',N.toLocaleString(),showSummary],['Projects',projsN,null],['Active Days',days,null],
    ['Per Day',Math.round(N/days),null],['Median Words',medW,null],
    ['Questions',Math.round(100*qN/N)+'%',()=>select(null,'Tone · Asks A Question',P.filter(p=>p.x.includes('?')),'var(--taken)')],
    ['Weekend',Math.round(100*wkndN/N)+'%',()=>select(null,'Weekend prompts',P.filter(p=>p.wd==='Sat'||p.wd==='Sun'),'var(--review)')],
    ['Peak Hour',String(peakH).padStart(2,'0')+':00',()=>select(null,`Peak hour · ${String(peakH).padStart(2,'0')}:00`,P.filter(p=>p.h===peakH),'var(--accent)')],
  ];
  const bar=$('pf-stats'); bar.innerHTML='';
  stats.forEach(([lab,v,fn])=>{const d=document.createElement('div'); d.className='stat'+(fn?' act':'');
    d.innerHTML=`<b>${v}</b><span>${lab}</span>`; if(fn)d.onclick=fn; bar.appendChild(d);});
}
function chProj(){
  const by={}; P.forEach(p=>by[p.p]=(by[p.p]||0)+1);
  const rows=Object.entries(by).sort((a,b)=>b[1]-a[1]);
  const W=520,rh=24,top=8,L=130,max=rows[0][1],H=top+rows.length*rh+6;
  const svg=$('pf-s-proj'); svg.innerHTML=''; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const sx=v=>L+(v/max)*(W-L-46);
  rows.forEach(([name,v],i)=>{const y=top+i*rh+rh/2,c=STC[i%STC.length];const g=el('g',{class:'hit'});
    g.appendChild(el('line',{x1:L,y1:y,x2:sx(v),y2:y,stroke:'var(--line)','stroke-width':2}));
    g.appendChild(el('circle',{cx:sx(v),cy:y,r:6,fill:c}));
    g.appendChild(txt(L-10,y+4,sp(name),{'text-anchor':'end','font-size':12,fill:'var(--text)'}));
    g.appendChild(txt(sx(v)+11,y+4,v,{'font-size':11,fill:'var(--muted)'}));
    g.onclick=()=>select(g,`Project · ${sp(name)}`,P.filter(p=>p.p===name),c); svg.appendChild(g);});
  $('pf-c-proj').innerHTML=`top focus<br><b>${rows[0][1]}</b> on ${esc(sp(rows[0][0]))}`;
}
function chHeat(){
  const m=Array.from({length:7},()=>Array(24).fill(0));
  P.forEach(p=>{const r=DOW.indexOf(p.wd); if(r>=0)m[r][p.h]++;});
  let mx=0;m.forEach(r=>r.forEach(v=>mx=Math.max(mx,v)));
  const W=520,cell=18,L=40,top=6,H=top+7*cell+24,cw=(W-L-6)/24;
  const svg=$('pf-s-heat'); svg.innerHTML=''; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const col=v=>{if(!v)return '#141822';const t=v/mx,bg=[28,34,48],mid=[110,139,255],hi=[201,213,255];
    const mix=(x,y,f)=>Math.round(x+(y-x)*f);let c1,c2,f;
    if(t<0.6){c1=bg;c2=mid;f=t/0.6;}else{c1=mid;c2=hi;f=(t-0.6)/0.4;}
    return `rgb(${mix(c1[0],c2[0],f)},${mix(c1[1],c2[1],f)},${mix(c1[2],c2[2],f)})`;};
  for(let r=0;r<7;r++){svg.appendChild(txt(L-8,top+r*cell+13,DOW[r],{'text-anchor':'end','font-size':10,fill:'var(--muted)'}));
    for(let h=0;h<24;h++){const v=m[r][h];
      const rect=el('rect',{x:L+h*cw,y:top+r*cell,width:cw-1.5,height:cell-1.5,rx:2,fill:col(v),class:v?'hit':''});
      if(v)rect.onclick=()=>select(rect,`${DOW[r]} · ${String(h).padStart(2,'0')}:00`,P.filter(p=>p.wd===DOW[r]&&p.h===h),'var(--accent)');
      svg.appendChild(rect);}}
  for(let h=0;h<24;h+=4)svg.appendChild(txt(L+h*cw,top+7*cell+14,String(h).padStart(2,'0'),{'font-size':9,fill:'var(--muted)'}));
  const wknd=P.filter(p=>p.wd==='Sat'||p.wd==='Sun').length;
  $('pf-c-heat').innerHTML=`weekend share<br><b>${Math.round(100*wknd/N)}%</b>`;
}
function chTone(){
  const rows=TONE.map(t=>({k:t.k,n:P.filter(t.t).length,t})).sort((a,b)=>a.n-b.n);
  const W=520,rh=20,top=6,L=150,max=Math.max(...rows.map(r=>r.n))||1,H=top+rows.length*rh+6;
  const svg=$('pf-s-tone'); svg.innerHTML=''; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const sx=v=>L+(v/max)*(W-L-48);
  rows.forEach((r,i)=>{const y=top+i*rh+rh/2,pc=Math.round(100*r.n/N);
    const c=r.k==='Asks A Question'?'var(--taken)':(pc<3?'var(--line)':'var(--accent)');const g=el('g',{class:'hit'});
    g.appendChild(el('line',{x1:L,y1:y,x2:sx(r.n),y2:y,stroke:'var(--line)','stroke-width':2}));
    g.appendChild(el('circle',{cx:sx(r.n),cy:y,r:5,fill:c}));
    g.appendChild(txt(L-10,y+4,r.k,{'text-anchor':'end','font-size':11,fill:'var(--text)'}));
    g.appendChild(txt(sx(r.n)+9,y+4,pc+'%',{'font-size':10,fill:'var(--muted)'}));
    g.onclick=()=>select(g,`Tone · ${r.k}`,P.filter(r.t.t),c==='var(--line)'?'var(--accent)':c); svg.appendChild(g);});
  const q=P.filter(p=>p.x.includes('?')).length;
  $('pf-c-tone').innerHTML=`#1 mode<br><b>${Math.round(100*q/N)}%</b> ask`;
}
function chLen(){
  const bins=16,wbin=25,mxc=400,cnt=Array(bins).fill(0);
  P.forEach(p=>{let b=Math.min(bins-1,Math.floor(Math.min(p.c,mxc-1)/wbin));cnt[b]++;});
  const W=520,H=180,L=6,top=10,bottom=24,max=Math.max(...cnt)||1,bw=(W-L-6)/bins;
  const svg=$('pf-s-len'); svg.innerHTML=''; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const med=[...P.map(p=>p.c)].sort((a,b)=>a-b)[Math.floor(N/2)];
  cnt.forEach((v,i)=>{const h=(v/max)*(H-top-bottom),lo=i*wbin,hi=(i+1)*wbin;
    const rect=el('rect',{x:L+i*bw+1,y:H-bottom-h,width:bw-2,height:h,rx:2,fill:'var(--accent)',class:'hit'});
    rect.onclick=()=>select(rect,`Length · ${lo}–${hi} chars`,P.filter(p=>(p.c>=lo&&p.c<hi)||(i===bins-1&&p.c>=lo)),'var(--accent)'); svg.appendChild(rect);});
  for(let c=0;c<=400;c+=100)svg.appendChild(txt(L+(c/wbin)*bw,H-8,c,{'font-size':9,fill:'var(--muted)','text-anchor':'middle'}));
  const mx2=L+(Math.min(med,mxc)/wbin)*bw;
  svg.appendChild(el('line',{x1:mx2,y1:top,x2:mx2,y2:H-bottom,stroke:'var(--taken)','stroke-width':2}));
  svg.appendChild(txt(mx2+5,top+10,`median ${med}`,{'font-size':10,fill:'var(--taken)'}));
  $('pf-c-len').innerHTML=`half under<br><b>${med}</b> chars`;
}
function chWeek(){
  const monday=d=>{const dt=new Date(d);dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return ymd(dt);};
  const wk={};P.forEach(p=>{const k=monday(p.dt);(wk[k]=wk[k]||[]).push(p);});
  const keys=Object.keys(wk).sort();
  const series=keys.map(k=>{const g=wk[k];const ws=g.map(p=>p.w).sort((a,b)=>a-b);
    return {k,med:ws[Math.floor(ws.length/2)],q:Math.round(100*g.filter(p=>p.x.includes('?')).length/g.length),list:g};});
  const W=1080,L=52,R=20,bh=78,gap=42,labels=18,H=8+bh+gap+bh+labels;
  const svg=$('pf-s-wk'); svg.innerHTML=''; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const pad=14,xs=i=>series.length<2?(L+pad+(W-L-pad-R)/2):L+pad+i*((W-L-pad-R)/(series.length-1));
  function band(y0,title,color,dash,val,fmt){
    const max=Math.max(...series.map(val))||1,top=Math.ceil(max*1.18),yv=v=>y0+bh-(v/top)*bh;
    svg.appendChild(txt(L,y0-4,title,{'font-size':10,fill:color}));
    [0,top].forEach(t=>{svg.appendChild(el('line',{x1:L,y1:yv(t),x2:W-R,y2:yv(t),stroke:'var(--line2)','stroke-width':1}));
      svg.appendChild(txt(L-8,yv(t)+3,fmt(t),{'font-size':9,fill:'var(--muted)','text-anchor':'end'}));});
    let d='';series.forEach((s,i)=>d+=(i?'L':'M')+xs(i)+' '+yv(val(s))+' ');
    const path=el('path',{d,fill:'none',stroke:color,'stroke-width':2.2}); if(dash)path.setAttribute('stroke-dasharray','5 3'); svg.appendChild(path);
    series.forEach((s,i)=>{const g=el('g',{class:'hit'});
      g.appendChild(el('circle',{cx:xs(i),cy:yv(val(s)),r:11,fill:'transparent'}));
      g.appendChild(el('circle',{cx:xs(i),cy:yv(val(s)),r:4.5,fill:color}));
      g.appendChild(txt(xs(i),yv(val(s))-9,fmt(val(s)),{'font-size':9,fill:color,'text-anchor':'middle'}));
      g.onclick=()=>select(g,`Week of ${s.k}`,s.list,color); svg.appendChild(g);});
  }
  band(20,'Median Words / Prompt','var(--accent)',false,s=>s.med,v=>v);
  band(20+bh+gap,'% Asking A Question','var(--taken)',true,s=>s.q,v=>v+'%');
  series.forEach((s,i)=>svg.appendChild(txt(xs(i),H-4,s.k.slice(5),{'font-size':9,fill:'var(--muted)','text-anchor':'middle'})));
  $('pf-c-wk').innerHTML=`steady week to week`;
}
})();
</script>
