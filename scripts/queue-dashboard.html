<!doctype html>
<html><head><meta charset="utf-8"><title>DevBrain</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{--bg:#f5f6f8;--col:#fbfbfc;--card:#ffffff;--line:#e7e9ee;--line2:#eef0f3;
  --fg:#1b1f27;--mut:#6b7280;--accent:#5b5bd6;--on-accent:#fff;
  --warn:#b45309;--danger:#dc2626;--ok:#16a34a;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.03);}
*{box-sizing:border-box}
:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
body{margin:0;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;
  font:13px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
header{position:sticky;top:0;z-index:5;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:11px 18px;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--line)}
header h1{font-size:14px;margin:0;font-weight:600;letter-spacing:-.01em;cursor:pointer}
header h1:hover{color:var(--accent)}
header .sp{flex:1}
select,input,textarea,button{font:inherit;color:var(--fg);background:var(--card);
  border:1px solid var(--line);border-radius:8px;padding:6px 10px;box-shadow:var(--shadow)}
button{cursor:pointer;transition:border-color .12s,background .12s,box-shadow .12s}
button:hover{border-color:#cdd1da}
button.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
button.primary:hover{background:#4d4dc4;border-color:#4d4dc4}
button.ghost{background:var(--card)}
.count{color:var(--mut);font-size:12px}
.board{display:flex;gap:14px;padding:16px 18px;align-items:flex-start;overflow-x:auto}
.col{flex:0 0 296px;min-width:0;background:var(--col);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.col h2{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);font-weight:600;
  margin:0;padding:11px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line2)}
.col h2 .count{margin-left:auto;font-weight:500}
.col h2::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--mut);flex:0 0 auto}
.col[data-status=open] h2::before{background:#3b82f6}
.col[data-status=taken] h2::before{background:#f59e0b}
.col[data-status=review] h2::before{background:#8b5cf6}
.col[data-status=held] h2::before{background:#ef4444}
.col[data-status=done] h2::before{background:#22c55e}
.col:not([data-status]) h2::before{display:none}        /* monitor columns: no status dot */
.col .drop{padding:10px;display:flex;flex-direction:column;gap:8px;
  max-height:calc(100vh - 156px);overflow-y:auto}        /* cap column height; scroll inside */
.col.over{outline:2px solid var(--accent);outline-offset:-2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:grab;
  box-shadow:var(--shadow);overflow-wrap:anywhere;transition:box-shadow .12s,border-color .12s,transform .04s}
.card:hover{border-color:#d4d8e0;box-shadow:0 2px 8px rgba(16,24,40,.09)}
.card:active{cursor:grabbing;transform:scale(.997)}
.card .t{font-size:13px;line-height:1.4;margin:0 0 6px;font-weight:500;color:var(--fg)}
.card .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--mut)}
.card .pri{font-variant-numeric:tabular-nums}
.card .ok{color:var(--ok);font-weight:600}
.card .reason{margin-top:6px;color:var(--warn)}
.card a{color:var(--accent);text-decoration:none;font-weight:500}
.empty{color:var(--mut);font-size:11px;text-align:center;padding:18px}
.modal{position:fixed;inset:0;background:rgba(16,24,40,.4);backdrop-filter:blur(2px);
  display:none;align-items:center;justify-content:center;z-index:20}
.modal.show{display:flex}
.sheet{background:var(--card);border:1px solid var(--line);border-radius:14px;width:min(600px,94vw);
  max-height:92vh;overflow:auto;padding:20px;box-shadow:0 12px 40px rgba(16,24,40,.18)}
.sheet h3{margin:0 0 14px;font-size:15px;font-weight:600}
.fld{display:flex;gap:12px;margin-bottom:12px}
.fld>label{flex:1;display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--mut);font-weight:500}
.fld>label.chk{flex-direction:row;align-items:center;gap:8px;font-size:13px;color:var(--fg);font-weight:400;cursor:pointer}
input[type=checkbox]{width:auto;padding:0;box-shadow:none;accent-color:var(--accent)}
textarea{min-height:110px;resize:vertical;width:100%}
.actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.danger{color:var(--danger);border-color:#f0caca}
small.k{color:var(--mut)}
</style></head>
<body>
<header>
  <h1 id="home" title="back to all tasks">DevBrain</h1>
  <button class="ghost" id="nsToggle" style="display:none">🌙 Nightshift</button>
  <span class="sp"></span>
  <select id="filterProject"><option value="">all projects</option></select>
  <input id="search" placeholder="search…" style="width:170px">
  <button class="primary" id="newBtn">＋ New</button>
</header>
<div class="board" id="board"></div>
<div id="monitor" style="display:none;padding:12px 16px"></div>

<div class="modal" id="modal"><div class="sheet">
  <h3 id="mTitle">Edit task</h3>
  <div class="fld">
    <label style="flex:2">Title<input id="fTitle"></label>
    <label style="flex:0 0 80px">Priority<input id="fPriority" type="number" min="0" max="100"></label>
  </div>
  <div class="fld">
    <label>Status<select id="fStatus"></select></label>
    <label>Project<select id="fProject"></select></label>
  </div>
  <div class="fld"><label>Body<textarea id="fBody"></textarea></label></div>
  <div class="fld"><label>Reason / hold note<textarea id="fReason" style="min-height:54px"></textarea></label></div>
  <div class="fld"><label class="chk"><input type="checkbox" id="fApproved"> Approve for unattended run — let a nightshift agent take it over (install deps, use network)</label></div>
  <div class="fld"><small class="k" id="fMeta"></small></div>
  <div class="actions">
    <button class="primary" id="saveBtn">Save</button>
    <button class="ghost" id="cancelBtn">Cancel</button>
    <span class="sp" style="flex:1"></span>
    <button class="ghost danger" id="deleteBtn">Delete</button>
  </div>
</div></div>

<script>
const LABEL = {open:"Open",taken:"Taken",review:"Review",held:"Held",done:"Done"};
let DATA = {tasks:[],projects:[],statuses:[]}, EDIT = null;
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const safe = u => /^https?:\/\//i.test((u||"").trim()) ? u : "";

async function load(){
  DATA = await (await fetch("/api/todos")).json();
  const fp=$("#filterProject"), cur=fp.value;
  fp.innerHTML = '<option value="">all projects</option>'+DATA.projects.map(p=>`<option>${esc(p)}</option>`).join("");
  fp.value = cur;
  $("#fProject").innerHTML = DATA.projects.map(p=>`<option>${esc(p)}</option>`).join("");
  $("#fStatus").innerHTML = DATA.statuses.map(s=>`<option value="${s}">${LABEL[s]}</option>`).join("");
  render(); checkNS();
}
function render(){
  const proj=$("#filterProject").value, q=$("#search").value.toLowerCase();
  const tasks = DATA.tasks.filter(t=>(!proj||t.project===proj) &&
    (!q || (t.title+" "+t.body+" "+t.id).toLowerCase().includes(q)));
  const board=$("#board"); board.innerHTML="";
  for(const st of DATA.statuses){
    let list = tasks.filter(t=>t.status===st);
    list.sort(st==="done" ? (a,b)=>(b.done_at||"").localeCompare(a.done_at||"") : (a,b)=>b.priority-a.priority);
    const total=list.length, CAP=40, capped = st==="done" && total>CAP;  // done piles up; show recent only
    if(capped) list=list.slice(0,CAP);
    const c=document.createElement("div"); c.className="col"; c.dataset.status=st;
    c.innerHTML = `<h2>${LABEL[st]} <span class="count">${total}</span></h2><div class="drop"></div>`;
    const drop=c.querySelector(".drop");
    if(!total) drop.innerHTML='<div class="empty">—</div>';
    for(const t of list) drop.appendChild(card(t));
    if(capped) drop.insertAdjacentHTML("beforeend",`<div class="empty">+${total-CAP} older — search to find them</div>`);
    drop.addEventListener("dragover",e=>{e.preventDefault();c.classList.add("over");});
    drop.addEventListener("dragleave",()=>c.classList.remove("over"));
    drop.addEventListener("drop",e=>{e.preventDefault();c.classList.remove("over");
      const id=e.dataTransfer.getData("id"), pj=e.dataTransfer.getData("project");
      const t=DATA.tasks.find(x=>x.id===id&&x.project===pj);
      if(t && t.status!==st){ t.status=st; save(t); }});
    board.appendChild(c);
  }
}
function card(t){
  const el=document.createElement("div"); el.className="card"; el.draggable=true;
  const bits = [                                            // only what's worth a glance — no noise
    $("#filterProject").value ? "" : `<span>${esc(t.project)}</span>`,   // project only in all-projects view
    t.claimed_by ? `<span>${esc(t.claimed_by)}</span>` : "",
    t.approved ? `<span class="ok">✓ approved</span>` : "",
    safe(t.pr) ? `<a href="${esc(t.pr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">PR↗</a>` : "",
  ].filter(Boolean).join("");
  el.innerHTML = `<div class="t">${esc(t.title)||"<em>untitled</em>"}</div>
    ${bits?`<div class="meta">${bits}</div>`:""}
    ${t.reason?`<div class="reason">⚠ ${esc(t.reason)}</div>`:""}`;
  el.addEventListener("click",()=>openEdit(t));
  el.addEventListener("dragstart",e=>{e.dataTransfer.setData("id",t.id);e.dataTransfer.setData("project",t.project);});
  return el;
}
function openEdit(t){
  EDIT=t; $("#mTitle").textContent="Edit · "+t.id;
  $("#fTitle").value=t.title; $("#fPriority").value=t.priority;
  $("#fStatus").value=t.status; $("#fProject").value=t.project; $("#fProject").disabled=true;
  $("#fBody").value=t.body; $("#fReason").value=t.reason||""; $("#fApproved").checked=!!t.approved;
  $("#fMeta").textContent=`created ${t.created||"?"}${t.done_at?" · done "+t.done_at:""}`;
  $("#deleteBtn").style.display=""; $("#modal").classList.add("show"); $("#fTitle").focus();
}
function openCreate(){
  EDIT={create:true}; $("#mTitle").textContent="New task";
  $("#fTitle").value=""; $("#fPriority").value=40; $("#fStatus").value="open";
  $("#fProject").disabled=false; $("#fProject").value=$("#filterProject").value||DATA.projects[0];
  $("#fBody").value=""; $("#fReason").value=""; $("#fApproved").checked=false; $("#fMeta").textContent="";
  $("#deleteBtn").style.display="none"; $("#modal").classList.add("show"); $("#fTitle").focus();
}
function close(){ $("#modal").classList.remove("show"); EDIT=null; }
async function save(t){
  await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({project:t.project,id:t.id,title:t.title,body:t.body,priority:t.priority,status:t.status,reason:t.reason||""})});
  await load();
}
async function saveModal(){
  if(EDIT&&EDIT.create){
    if(!$("#fTitle").value.trim()) return $("#fTitle").focus();
    await fetch("/api/create",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project:$("#fProject").value,title:$("#fTitle").value,priority:+$("#fPriority").value,body:$("#fBody").value})});
  } else {
    await fetch("/api/save",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project:EDIT.project,id:EDIT.id,title:$("#fTitle").value,body:$("#fBody").value,
        priority:+$("#fPriority").value,status:$("#fStatus").value,reason:$("#fReason").value,approved:$("#fApproved").checked})});
  }
  close(); await load();
}
async function del(){
  if(!EDIT||EDIT.create) return;
  if(!confirm("Delete "+EDIT.id+"? This removes the .md file.")) return;
  await fetch("/api/delete",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({project:EDIT.project,id:EDIT.id})});
  close(); await load();
}
// --- nightshift run monitor (same dashboard): lists EVERY live fleet across projects,
// reading each <repo>/.nightshift/status.json forwarded by the server. No 2nd server,
// and no need to select the right project first.
let NS={runs:[]}, VIEW="board";
async function checkNS(){
  try{ NS = await (await fetch("/api/nightshift")).json(); }
  catch{ return; }   // keep last-good state on a hiccup, don't blank the monitor
  $("#nsToggle").style.display = (NS.runs.length || VIEW==="monitor") ? "" : "none";  // keep the escape hatch
  if(VIEW==="monitor") renderMonitor();
}
function setView(v){
  VIEW=v;
  $("#board").style.display = v==="board" ? "flex" : "none";
  $("#monitor").style.display = v==="monitor" ? "block" : "none";
  $("#nsToggle").textContent = v==="monitor" ? "≡ Board" : "🌙 Nightshift";
  if(v==="monitor") renderMonitor();
}
function renderMonitor(){
  $("#monitor").innerHTML = NS.runs.length ? NS.runs.map(fleet).join("")
    : '<div class="empty">no nightshift runs active</div>';
}
function fleet(r){
  const q=r.queue||{}, t=r.tokens_min||{};
  const workers=(r.workers||[]).map(w=>{
    const last=(w.responses&&w.responses.length)?w.responses[w.responses.length-1]:null;
    return `<div class="card"><div class="t">worker ${w.i} · <span class="pri">${esc(w.state)}</span></div>
      <div class="meta">${esc(w.task||"—")}</div>
      ${last?`<div class="reason" style="color:var(--mut);white-space:pre-wrap">${esc(last.text).slice(0,260)}</div>`:""}</div>`;
  }).join("") || '<div class="empty">no active workers</div>';
  const merges=(r.nightshift||[]).map(l=>`<div class="meta">${esc(l)}</div>`).join("") || '<div class="empty">nothing merged yet</div>';
  return `<div class="board" style="padding:0 0 14px">
    <div class="col" style="flex:1 1 360px"><h2>${esc(r.project)}
      <span class="count">${r.running?"running":"stopped"} · ↑${t.out||0} ↓${t.in||0}/m · ${q.done||0} done</span></h2>
      <div class="drop">${workers}</div></div>
    <div class="col" style="flex:1 1 360px"><h2>merged <span class="count">${(r.nightshift||[]).length}</span></h2><div class="drop">${merges}</div></div>
  </div>`;
}
$("#home").onclick=()=>{ $("#filterProject").value=""; $("#search").value=""; setView("board"); render(); };  // back to main menu
$("#nsToggle").onclick=()=>setView(VIEW==="board"?"monitor":"board");
setInterval(checkNS, 5000);
$("#newBtn").onclick=openCreate;
$("#saveBtn").onclick=saveModal; $("#cancelBtn").onclick=close; $("#deleteBtn").onclick=del;
$("#filterProject").onchange=render; $("#search").oninput=render;
$("#modal").onclick=e=>{if(e.target.id==="modal")close();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")close();});
load();
</script>
</body></html>
