# devbrain — gate merges on the aggregate test suite. Capture hooks fail silently,
# so a regression in capture/redact/memory only surfaces at a later empty /distill.
name: test

# CI runs only on `main`. The nightshift fleet opens one PR per task into `nightshift`;
# the local merge gate already replicates the suite per branch, so per-task CI is noise.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # ubuntu has docker → REQUIRE the clean-room install test to actually run
        # (a silent skip fails the build, not a false green). macos has no docker →
        # left free to skip.
        include:
          - os: ubuntu-latest
            require: docker
          - os: macos-latest
            require: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      # The whole suite is Go now: unit, golden, and CLI black-box tests that
      # build the binary and drive it as a subprocess (internal/clitest). The
      # docker clean-room test runs where docker exists (ubuntu) and t.Skip
      # cleanly otherwise (macos).
      - name: Go vet + full test suite
        env:
          DEVBRAIN_TEST_REQUIRE: ${{ matrix.require }}
        run: go vet ./... && go test -race ./...
