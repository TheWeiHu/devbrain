# devbrain — gate merges on the aggregate test suite. Capture hooks fail silently,
# so a regression in capture/redact/memory only surfaces at a later empty /distill.
name: test

# CI runs only on `main`. The nightshift fleet opens one PR per task into `nightshift`;
# the local merge gate already replicates the suite per branch, so per-task CI is noise.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Go vet + unit/golden tests
        run: go vet ./... && go test -race ./...

  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # The bash behavioral suite runs against the Go binary via the shims at the
      # original script paths. Docker clean-room, browser dogfood, and packaging
      # tests move to the e2e tier (reintroduced with the release plumbing).
      - name: Parity suite against the Go binary
        run: make parity
