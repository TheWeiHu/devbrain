# devbrain — gate merges on the aggregate test suite (task 0066).
# Capture hooks fail silently, so a regression in capture/redact/memory only
# surfaces at a later empty /distill. Run the 0065 aggregate runner on every PR.
name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # git, jq, python3, docker are preinstalled on ubuntu-latest. Install Playwright +
      # Chromium so the queue-dashboard browser dogfood (test-queue-dashboard-dogfood.py)
      # actually runs here — it is the only end-to-end coverage of the control plane, and
      # the fast nightshift gate skips it. The docker clean-room test SKIPs if absent.
      - name: Install Playwright + Chromium (for the dashboard dogfood test)
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium
      - name: Run test suite
        # DEVBRAIN_TEST_REQUIRE guarantees the docker clean-room install test actually runs
        # on every PR — install.sh is the highest-churn surface, so if this runner ever
        # lacks docker the test must turn CI red, not silently skip (task 0032).
        env:
          DEVBRAIN_TEST_REQUIRE: cross-platform-docker
        run: make test
