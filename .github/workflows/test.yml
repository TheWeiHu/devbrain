# devbrain — gate merges on the aggregate test suite. Capture hooks fail silently,
# so a regression in capture/redact/memory only surfaces at a later empty /distill.
name: test

# CI runs only on `main`. The nightshift fleet opens one PR per task into `nightshift`;
# the local merge gate already replicates the suite per branch, so per-task CI is noise.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # git, jq, python3, docker are preinstalled on ubuntu-latest. Install Playwright +
      # Chromium so the queue-dashboard browser dogfood (test-queue-dashboard-dogfood.py)
      # actually runs here — it is the only end-to-end coverage of the control plane, and
      # the fast nightshift gate skips it. The docker clean-room test SKIPs if absent.
      - name: Install Playwright + Chromium (for the dashboard dogfood test)
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium
      - name: Run test suite
        run: make test
