# Guards the release config: a goreleaser snapshot build on any PR touching
# .goreleaser.yaml, so a broken release config is caught here instead of at
# release time (releases are cut locally, off CI — this is the only automated check).
name: release-check

on:
  pull_request:
    paths:
      - .goreleaser.yaml
      - .github/workflows/release-check.yml

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # goreleaser reads tags to derive the version
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish
      - name: Formula desc within Homebrew's 80-char limit
        run: |
          desc=$(sed -n 's/^  desc "\(.*\)"$/\1/p' dist/homebrew/Formula/devbrain.rb | head -1)
          echo "desc (${#desc} chars): $desc"
          [ "${#desc}" -lt 80 ] || { echo "::error::formula desc >= 80 chars — brew audit would reject it"; exit 1; }
